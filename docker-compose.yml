services:
  nginx:
    image: nginx:1.27-alpine
    container_name: room-ai-nginx
    depends_on:
      - user-web
      - admin-web
      - api
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - room-ai

  user-web:
    build:
      context: ./apps/user-web
      dockerfile: Dockerfile
    container_name: room-ai-user-web
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_STATIC_BASE_URL: ${VITE_STATIC_BASE_URL}
    expose:
      - "80"
    networks:
      - room-ai

  admin-web:
    build:
      context: ./apps/admin-web
      dockerfile: Dockerfile
    container_name: room-ai-admin-web
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    expose:
      - "80"
    networks:
      - room-ai

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: room-ai-api
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      OSS_ENDPOINT: ${OSS_ENDPOINT}
      OSS_PUBLIC_BASE_URL: ${OSS_PUBLIC_BASE_URL}
      OSS_BUCKET_PUBLIC: ${OSS_BUCKET_PUBLIC}
      OSS_BUCKET_PRIVATE: ${OSS_BUCKET_PRIVATE}
      OSS_ACCESS_KEY: ${OSS_ACCESS_KEY}
      OSS_SECRET_KEY: ${OSS_SECRET_KEY}
      AI_SERVICE_BASE_URL: ${AI_SERVICE_BASE_URL}
      APP_BASE_URL: ${APP_BASE_URL}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      MINIMAX_IMAGE_MODEL: ${MINIMAX_IMAGE_MODEL}
    expose:
      - "3000"
    networks:
      - room-ai

  ai-service:
    build:
      context: ./services/ai-service
      dockerfile: Dockerfile
    container_name: room-ai-ai-service
    depends_on:
      - redis
      - minio
    environment:
      PYTHONUNBUFFERED: 1
      PORT: 8000
      REDIS_URL: ${REDIS_URL}
      DATABASE_URL: ${DATABASE_URL}
      MINIMAX_API_BASE: ${MINIMAX_API_BASE}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY}
      MINIMAX_TEXT_MODEL: ${MINIMAX_TEXT_MODEL}
      MINIMAX_IMAGE_MODEL: ${MINIMAX_IMAGE_MODEL}
      MINIMAX_CALLBACK_SECRET: ${MINIMAX_CALLBACK_SECRET}
      MINIMAX_MOCK_MODE: ${MINIMAX_MOCK_MODE}
      MINIMAX_USE_IMAGE_REFERENCE: ${MINIMAX_USE_IMAGE_REFERENCE}
      APP_BASE_URL: ${APP_BASE_URL}
      OSS_ENDPOINT: ${OSS_ENDPOINT}
      OSS_BUCKET_PUBLIC: ${OSS_BUCKET_PUBLIC}
      OSS_BUCKET_PRIVATE: ${OSS_BUCKET_PRIVATE}
      OSS_ACCESS_KEY: ${OSS_ACCESS_KEY}
      OSS_SECRET_KEY: ${OSS_SECRET_KEY}
    expose:
      - "8000"
    networks:
      - room-ai

  worker:
    build:
      context: ./services/worker
      dockerfile: Dockerfile
    container_name: room-ai-worker
    depends_on:
      - redis
      - api
      - ai-service
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      REDIS_URL: ${REDIS_URL}
      DATABASE_URL: ${DATABASE_URL}
      AI_SERVICE_BASE_URL: ${AI_SERVICE_BASE_URL}
      API_BASE_URL: ${API_BASE_URL}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
    networks:
      - room-ai

  postgres:
    image: postgres:16-alpine
    container_name: room-ai-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - room-ai

  redis:
    image: redis:7-alpine
    container_name: room-ai-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - room-ai

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    container_name: room-ai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - room-ai

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  room-ai:
    driver: bridge
